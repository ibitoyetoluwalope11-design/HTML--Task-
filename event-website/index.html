<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Visionary Summit 2026</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="overlay">
        <header>
            <h1>Visionary Summit 2026</h1>
            <p>
                Visionary Summit 2026 is a transformative experience designed for creators,
                innovators, and leaders ready to shape the future. Connect, collaborate,
                and unlock new possibilities in technology and creativity.
            </p>
        </header>

        <section class="form-container">
            <h2>Secure Your Spot</h2>

            <form>
                <div class="grid">
                    <input type="text" placeholder="First Name" required>
                    <input type="text" placeholder="Last Name" required>
                </div>

                <input type="number" placeholder="Age" required>
                <input type="email" placeholder="Email Address" required>

                <textarea rows="5" placeholder="Tell us about yourself..." required></textarea>

                <button type="submit">Register Now</button>
            </form>
        </section>
    </div>

</body>
  </html>
