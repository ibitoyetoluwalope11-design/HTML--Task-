<!DOCTYPE html>
<html>
<head>
  <title>Product</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="product-container">

  <img src="images/product.jpg" alt="Product">

  <div class="details">
    <h2>Smartphone X</h2>

    <p>
      A powerful smartphone with amazing camera quality, long battery life,
      and sleek design.
    </p>

    <p>⭐ Rating: 4.5/5</p>
    <p>👥 1,200 people bought this</p>

    <div class="quantity">
      <button>-</button>
      <span>1</span>
      <button>+</button>
    </div>

    <button class="buy-btn">Buy Now</button>

  </div>

</div>

</body>
</html>
